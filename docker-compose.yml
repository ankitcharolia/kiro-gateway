# ACP-compliant Kiro Gateway — Docker Compose
# Requires: kiro CLI authenticated on the host (kiro auth login)

services:
  kiro-gateway:
    image: ghcr.io/ankitcharolia/kiro-gateway:latest
    # Or build locally:
    # build: .
    container_name: kiro-gateway
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8000}:8000"
    environment:
      # ── Required ────────────────────────────────────────────────────
      PROXY_API_KEY: ${PROXY_API_KEY:-change-me}
      # ── CLI ─────────────────────────────────────────────────────────
      KIRO_CLI_COMMAND: /usr/local/bin/kiro
      # ── Feature flags ───────────────────────────────────────────────
      ACP_ENABLED: ${ACP_ENABLED:-true}
      OPENAI_SHIM_ENABLED: ${OPENAI_SHIM_ENABLED:-true}
      ANTHROPIC_SHIM_ENABLED: ${ANTHROPIC_SHIM_ENABLED:-true}
      # ── Server ──────────────────────────────────────────────────────
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
      # ── Compliance ──────────────────────────────────────────────────
      COMPLIANCE_MODE: ${COMPLIANCE_MODE:-true}
    volumes:
      # Mount your authenticated kiro credentials into the container (read-only).
      # Run `kiro auth login` on the host before starting the container.
      - "${HOME}/.kiro:/home/gateway/.kiro:ro"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
