# ACP-compliant Kiro Gateway — Docker Compose
#
# The Kiro CLI is installed inside the image at build time, so you do NOT mount
# the binary. You only mount your Kiro credentials/state (per-user secrets that
# cannot be baked into an image):
#   ~/.aws                    SSO token cache
#   ~/.kiro                   sessions, settings
#   ~/.local/share/kiro-cli   OAuth token secret store (data.sqlite3) + helpers
#
# Prerequisites on the host:
#   1. Install the Kiro CLI and run `kiro-cli login` once.
#   2. Export your UID/GID so the container runs as you and can read+write the
#      mounted credentials (the token is refreshed in place):
#         export UID="$(id -u)" GID="$(id -g)"
#
# The published image only reflects these settings once a release is built from
# current source. To run local source instead, comment out `image:` and
# uncomment `build: .` below.

services:
  kiro-gateway:
    image: ghcr.io/ankitcharolia/kiro-gateway:latest
    # build: .
    container_name: kiro-gateway
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "${SERVER_PORT:-8000}:8000"
    environment:
      # ── Required ────────────────────────────────────────────────────
      PROXY_API_KEY: ${PROXY_API_KEY:-change-me}
      # ── Tool execution ──────────────────────────────────────────────
      # true  = auto-approve kiro-cli built-in tool runs (file edits, commands)
      # false = answer-only (every tool permission request is denied)
      ACP_TRUST_TOOLS: ${ACP_TRUST_TOOLS:-false}
      # ── Feature flags ───────────────────────────────────────────────
      ACP_ENABLED: ${ACP_ENABLED:-true}
      OPENAI_SHIM_ENABLED: ${OPENAI_SHIM_ENABLED:-true}
      ANTHROPIC_SHIM_ENABLED: ${ANTHROPIC_SHIM_ENABLED:-true}
      # ── Server ──────────────────────────────────────────────────────
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
      # ── Compliance ──────────────────────────────────────────────────
      COMPLIANCE_MODE: ${COMPLIANCE_MODE:-true}
      HOME: /home/gateway
    volumes:
      # Kiro credentials/state — read-write (token refresh + session writes).
      - "${HOME}/.aws:/home/gateway/.aws"
      - "${HOME}/.kiro:/home/gateway/.kiro"
      - "${HOME}/.local/share/kiro-cli:/home/gateway/.local/share/kiro-cli"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
