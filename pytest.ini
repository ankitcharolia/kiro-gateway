[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Add repo root to PYTHONPATH so `import kiro` works without install
pythonpath = .

# pytest-asyncio: resolve all async fixtures/tests automatically
asyncio_mode = auto

# Exclude manual integration scripts from auto-discovery
# Run manually: python manual_api_test.py
norecursedirs = .git __pycache__ old requests _notes
