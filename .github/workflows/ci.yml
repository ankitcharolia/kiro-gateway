name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Run tests with coverage
        run: |
          uv run pytest --tb=short --cov=kiro --cov-report=term-missing --cov-report=xml -q
        env:
          KIRO_GATEWAY_API_KEY: test-proxy-key
          COMPLIANCE_MODE: "true"
          ACCOUNT_SYSTEM: "false"
          TRUNCATION_RECOVERY: "true"
          DEBUG_MODE: "false"
