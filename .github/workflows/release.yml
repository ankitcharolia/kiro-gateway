name: GitHub Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip build

      - name: Build source distribution and wheel
        run: python -m build

      - name: Extract changelog for this tag
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ -f CHANGELOG.md ]; then
            # Extract the section between this tag heading and the next heading
            NOTES=$(awk "/^## \[?${TAG}\]?|^## ${TAG}/"'{found=1; next} found && /^## /{exit} found{print}' CHANGELOG.md)
          fi
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          fi
          # Write multi-line output safely
          {
            echo 'notes<<EOF'
            echo "$NOTES"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: |
            dist/*.tar.gz
            dist/*.whl
          generate_release_notes: true
