name: Auto Label

# Applies type + priority labels to issues and pull requests based on their
# title (conventional-commit prefix) and body keywords. Re-runs on edits so a
# corrected title gets the right labels. Labels themselves are defined in
# .github/labels.yml and synced by .github/workflows/labels.yml.

on:
  issues:
    types: [opened, edited, reopened]
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

# pull_request_target runs with a write token even for fork PRs. This workflow
# never checks out or executes PR code — it only reads metadata and calls the
# Issues API — so it is not exposed to the usual pull_request_target risks.
permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: auto-label-${{ github.event_name }}-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label:
    name: Apply type and priority labels
    runs-on: ubuntu-latest
    steps:
      - name: Compute and apply labels
        uses: actions/github-script@v9
        with:
          script: |
            const isPR = Boolean(context.payload.pull_request);
            const target = isPR ? context.payload.pull_request : context.payload.issue;
            if (!target) {
              core.info("No issue or pull request in payload; nothing to do.");
              return;
            }

            const number = target.number;
            const title = (target.title || "").trim();
            const author = target.user || {};
            const login = (author.login || "");
            const isBot =
              author.type === "Bot" ||
              /\[bot\]$/i.test(login) ||
              /^(renovate|dependabot|github-actions|pre-commit-ci)\b/i.test(login);

            // IMPORTANT: only the TITLE is inspected. Bot PRs (renovate,
            // dependabot) embed upstream changelogs in the body that are full
            // of words like "bug fixes" and "documentation" — scanning the body
            // produced wildly wrong labels. The title is short and controlled.

            const toAdd = new Set();

            // Conventional-commit type → labels.
            const typeMap = {
              feat:     ["feature"],
              feature:  ["feature"],
              fix:      ["bug"],
              bugfix:   ["bug"],
              docs:     ["documentation"],
              doc:      ["documentation"],
              perf:     ["performance"],
              refactor: ["refactor"],
              test:     ["test"],
              tests:    ["test"],
              build:    ["build"],
              ci:       ["ci"],
              chore:    ["chore"],
              style:    ["chore"],
              deps:     ["dependencies"],
            };

            // Parse "type", "type(scope)", "type!:", "type(scope)!:" — require
            // the conventional "<type>: " shape so prose titles don't match.
            const conv = title.match(/^([a-z]+)(?:\(([^)]*)\))?(!)?:\s+/i);
            let convType = null;
            if (conv) {
              convType = conv[1].toLowerCase();
              const scope = (conv[2] || "").toLowerCase();
              const breaking = conv[3] === "!";
              if (breaking) {
                toAdd.add("breaking-change");
              }
              // A "deps" scope is a dependency update regardless of the type
              // (renovate uses both chore(deps) and fix(deps)). Classify it as
              // "dependencies" only — never "bug" — to avoid the mislabeling
              // reported for renovate PRs.
              if (scope === "deps" || scope.includes("deps")) {
                toAdd.add("dependencies");
              } else if (typeMap[convType]) {
                typeMap[convType].forEach((l) => toAdd.add(l));
              }
            }

            // Fallback runs ONLY when the title has no conventional prefix, and
            // still only against the title.
            if (!convType) {
              const isDepUpdate =
                /\b(update|bump|upgrade)\b[^]*\b(to|from)\b\s*v?\d/i.test(title) ||
                /\bupdate (dependency|dependencies|module|action|digest|lock ?file|pre-commit hook)\b/i.test(title);
              if (isDepUpdate) {
                toAdd.add("dependencies");
              } else {
                const titleRules = [
                  { label: "bug",           re: /\b(bug|broken|crash(es|ed)?|regression|fix(es|ed)?|hotfix)\b/i },
                  { label: "feature",       re: /\b(feature|implement|add support|introduce)\b/i },
                  { label: "documentation", re: /\b(docs?|documentation|readme)\b/i },
                  { label: "question",      re: /\b(question|how (do|to|can)|is it possible)\b/i },
                ];
                for (const rule of titleRules) {
                  if (rule.re.test(title)) {
                    toAdd.add(rule.label);
                  }
                }
              }
            }

            // "BUG:" issue-template title prefix.
            if (!isPR && /^bug\b[:\-]/i.test(title)) {
              toAdd.add("bug");
            }

            // Priority — explicit "priority: X" in the title wins; otherwise a
            // light keyword heuristic on the title. Never applied to bot PRs.
            if (!isBot) {
              const explicit = title.toLowerCase().match(/priority\s*[:=]\s*(critical|high|medium|low)/);
              if (explicit) {
                toAdd.add(`priority: ${explicit[1]}`);
              } else if (/\b(security|vulnerability|cve|data ?loss|outage|production down|p0|urgent)\b/i.test(title)) {
                toAdd.add("priority: critical");
              } else if (/\b(p1|high priority|blocker|blocking|asap)\b/i.test(title)) {
                toAdd.add("priority: high");
              }
            }

            if (toAdd.size === 0) {
              core.info("No labels matched; leaving as-is.");
              return;
            }

            // Only add labels that aren't already present, so we don't fight
            // manual triage or re-notify on every edit.
            const existing = new Set((target.labels || []).map((l) => (typeof l === "string" ? l : l.name)));
            const labels = [...toAdd].filter((l) => !existing.has(l));
            if (labels.length === 0) {
              core.info("All computed labels already present.");
              return;
            }

            core.info(`Adding labels to #${number}: ${labels.join(", ")}`);
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              labels,
            });
