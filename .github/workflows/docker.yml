name: Docker Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run tests with pytest
        run: |
          pytest -v --tb=short --asyncio-mode=auto

      - name: Generate coverage report
        if: success()
        run: |
          pytest --cov=kiro --cov-report=xml --cov-report=term --asyncio-mode=auto

      - name: Upload coverage to artifacts
        if: success()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: coverage-report
          path: coverage.xml

  build:
    name: Build and Test Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=kiro-gateway
            org.opencontainers.image.description=ACP-compliant gateway for Kiro — OpenAI and Anthropic compatible shims over kiro CLI
            org.opencontainers.image.url=https://github.com/ankitcharolia/kiro-gateway
            org.opencontainers.image.source=https://github.com/ankitcharolia/kiro-gateway
            org.opencontainers.image.licenses=AGPL-3.0
            org.opencontainers.image.vendor=ankitcharolia

      - name: Clean up test artifacts
        run: |
          rm -f credentials.json state.json
          echo "Cleaned up test artifacts (credentials.json, state.json)"

      - name: Build Docker image
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: kiro-gateway:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        id: trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: kiro-gateway:test
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'docker-image'

      - name: Test Docker image
        run: |
          echo "=== Testing Docker image structure ==="

          docker run --rm kiro-gateway:test sh -c "
            test -f /app/main.py && \
            test -d /app/kiro && \
            test -w /app && \
            touch /app/test.tmp && rm /app/test.tmp && \
            echo '\u2713 File structure and write permissions OK'
          "

          docker run --rm kiro-gateway:test python -c "
          import kiro
          import kiro.auth
          import kiro.account_manager
          import kiro.config
          import kiro.routes_openai
          import kiro.routes_anthropic
          import fastapi
          import httpx
          import loguru
          import uvicorn
          print('\u2713 All critical imports OK')
          "

          echo ""
          echo "========================================="
          echo "\u2713 Docker image tests passed"
          echo "========================================="

      - name: Build and push Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # NOTE: To make the GHCR package public after the first successful push,
      # visit: https://github.com/users/ankitcharolia/packages/container/kiro-gateway/settings
      # The visibility API returns 404 until the package exists, so it cannot
      # be automated in the same workflow run that creates the package.

      - name: Image digest
        if: github.event_name != 'pull_request'
        run: echo ${{ steps.meta.outputs.digest }}
