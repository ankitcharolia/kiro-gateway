name: Request Missing Info

# Checks new/edited issues and pull requests for the information needed to act
# on them. When something required is missing, posts a single guidance comment
# and applies the "needs-more-info" label. When the author later supplies the
# info (on edit), the label is removed automatically.

on:
  issues:
    types: [opened, edited]
  pull_request_target:
    types: [opened, edited]

# Never checks out or runs PR code — only reads metadata and writes a comment
# and a label via the API. Safe under pull_request_target.
permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: needs-info-${{ github.event_name }}-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    name: Check for missing information
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate completeness
        uses: actions/github-script@v9
        with:
          script: |
            const LABEL = "needs-more-info";
            const MARKER = "<!-- kiro-gateway:needs-more-info -->";

            const isPR = Boolean(context.payload.pull_request);
            const target = isPR ? context.payload.pull_request : context.payload.issue;
            if (!target) {
              core.info("No issue or pull request in payload; nothing to do.");
              return;
            }

            const number = target.number;
            const author = target.user && target.user.login;
            const title = (target.title || "").trim();
            const body = (target.body || "").trim();
            const bodyLower = body.toLowerCase();

            // Build a list of human-readable reasons the report is incomplete.
            const missing = [];

            if (isPR) {
              if (body.length < 30) {
                missing.push("a **description** of what this PR changes and why");
              }
              const linksIssue =
                /\b(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#\d+/i.test(body) ||
                /#\d+/.test(body);
              if (!linksIssue) {
                missing.push("a **linked issue** (e.g. `Closes #123`) or context for the change");
              }
              const mentionsTests =
                /\btest|pytest|verif|how (i|we) (tested|verified)|coverage\b/i.test(bodyLower);
              if (!mentionsTests) {
                missing.push("a note on **testing** — `pytest -q` output or why tests aren't needed");
              }
            } else {
              // Issues.
              if (body.length < 30) {
                missing.push("a clear **description** of the problem or request");
              }
              const looksLikeBug =
                /^bug\b/i.test(title) ||
                (target.labels || []).some((l) => (typeof l === "string" ? l : l.name) === "bug") ||
                /\b(error|crash|traceback|exception|not working|does ?n'?t work)\b/i.test(bodyLower);
              if (looksLikeBug) {
                const hasVersion = /version|v\d|latest|\d+\.\d+/i.test(bodyLower);
                if (!hasVersion) {
                  missing.push("the **Kiro Gateway version** you're running");
                }
                const hasRepro =
                  /reproduc|steps|expected|actual|how (i|to)|command|request|payload/i.test(bodyLower);
                if (!hasRepro) {
                  missing.push("**steps to reproduce** (what you did, expected vs. actual)");
                }
                const hasLogs = /log|debug|stack ?trace|traceback|```/i.test(body);
                if (!hasLogs) {
                  missing.push("**logs** from `debug_logs/` or the error output (use a code block)");
                }
              }
            }

            const hasLabel = (target.labels || []).some(
              (l) => (typeof l === "string" ? l : l.name) === LABEL
            );

            // Find any prior bot comment so we update instead of spamming.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              per_page: 100,
            });
            const prior = comments.find((c) => (c.body || "").includes(MARKER));

            // ── Complete: clear the label and acknowledge once. ──────────────
            if (missing.length === 0) {
              if (hasLabel) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: number,
                  name: LABEL,
                }).catch(() => core.info("Label already removed."));
                if (prior) {
                  await github.rest.issues.updateComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: prior.id,
                    body: `${MARKER}\n✅ Thanks @${author}, this looks complete now. Removing the \`${LABEL}\` label.`,
                  });
                }
              }
              core.info("All required information present.");
              return;
            }

            // ── Incomplete: label + comment (create or update). ──────────────
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              labels: [LABEL],
            });

            const kind = isPR ? "pull request" : "issue";
            const checklist = missing.map((m) => `- [ ] ${m}`).join("\n");
            const message =
              `${MARKER}\n` +
              `Thanks for the ${kind}, @${author}! To help us act on it, please add the following:\n\n` +
              `${checklist}\n\n` +
              `Edit the description above to include the missing details — I'll re-check automatically and ` +
              `remove the \`${LABEL}\` label once everything's there.`;

            if (prior) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: prior.id,
                body: message,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: number,
                body: message,
              });
            }
            core.info(`Requested ${missing.length} missing item(s) on #${number}.`);
