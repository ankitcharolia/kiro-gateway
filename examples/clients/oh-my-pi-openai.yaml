# Put the following in ~/.omp/agent/models.yml
#
# Drives Oh My Pi (https://github.com/can1357/oh-my-pi) through the gateway's
# OpenAI shim (api: openai-completions -> POST /v1/chat/completions).
#
# `apiKey` is read as an environment variable name first; if no such variable
# exists the literal string is used as the token. Replace `change-me` with your
# KIRO_GATEWAY_API_KEY value, or set it to the env var name `KIRO_GATEWAY_API_KEY`.
#
# Reasoning/"thinking" is MODEL-DEPENDENT: kiro-cli emits it for claude-opus-4.8
# but not for claude-sonnet-4.6 (verified). Use the opus model to see reasoning
# (the gateway surfaces it via reasoning_content when ACP_SURFACE_THINKING=true,
# the default). `reasoning: true` below just tells Oh My Pi to display it.
providers:
  kiro:
    baseUrl: http://127.0.0.1:8000/v1
    apiKey: change-me
    api: openai-completions
    authHeader: true          # inject Authorization: Bearer <key>
    models:
      - id: claude-opus-4.8
        name: Claude Opus 4.8 (thinking)
        reasoning: true
        input: [text, image]
        contextWindow: 1000000
        maxTokens: 32000
        cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }
      - id: claude-sonnet-4.6
        name: Claude Sonnet 4.6
        reasoning: true
        input: [text, image]
        contextWindow: 1000000
        maxTokens: 64000
        cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }
      - id: auto
        name: Auto
        input: [text, image]
        contextWindow: 1000000
        maxTokens: 64000
        cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }
